services:
  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    container_name: log_clickhouse
    ports:
      - "8123:8123"  # HTTP
      - "9000:9000"  # Native
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      CLICKHOUSE_DB: logs
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  redis:
    image: redis:7-alpine
    container_name: log_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  collector:
    build: ./collector
    container_name: log_collector
    ports:
      - "8080:8080"
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: production

  processor:
    build: ./processor
    container_name: log_processor
    depends_on:
      - redis
      - clickhouse
    environment:
      REDIS_URL: redis://redis:6379
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
    restart: unless-stopped

  api:
    build: ./api
    container_name: log_api
    ports:
      - "8000:8000"
    depends_on:
      - clickhouse
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123

  frontend:
    build: ./frontend
    container_name: log_frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  clickhouse_data:
  redis_data:
